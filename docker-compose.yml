services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_MAPTILER_KEY: ${VITE_MAPTILER_KEY}
        VITE_CESIUM_TOKEN: ${VITE_CESIUM_TOKEN}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
